name: Update IBM JDK CVE page

on:
  schedule:
    - cron: "0 6 */2 * *"      # 每2天 UTC 06:00（台灣時間下午 2 點）自動更新
  workflow_dispatch:          # 也可在 Actions 頁面手動觸發

permissions:
  contents: write             # 允許把重建後的 index.html commit 回 repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild index.html
        run: python generate.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update CVE data ($(date -u +%F))"
          git push
